<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Study Buddy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: "#f0f9ff",
              100: "#e0f2fe",
              500: "#0ea5e9",
              600: "#0284c7",
              700: "#0369a1",
            },
          },
        },
      },
    };
  </script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-50 via-brand-50 to-slate-100 text-slate-800">
  <div class="mx-auto flex min-h-screen max-w-2xl flex-col px-4 py-8 sm:px-6 sm:py-12">
    <header class="mb-8 text-center">
      <div class="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-2xl bg-brand-500 text-2xl text-white shadow-lg shadow-brand-500/30">
        📚
      </div>
      <h1 class="text-3xl font-bold tracking-tight text-slate-900 sm:text-4xl">AI Study Buddy</h1>
      <p class="mt-2 text-sm text-slate-500 sm:text-base">
        Enter any topic and get a 3-question multiple-choice quiz streamed live.
      </p>
    </header>

    <main class="flex flex-1 flex-col gap-6">
      <section class="rounded-2xl border border-slate-200/80 bg-white p-5 shadow-sm sm:p-6">
        <label for="topic" class="mb-2 block text-sm font-medium text-slate-700">
          Study topic
        </label>
        <div class="flex flex-col gap-3 sm:flex-row">
          <input
            id="topic"
            type="text"
            placeholder="e.g. Photosynthesis, World War II, Python basics..."
            class="flex-1 rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-base outline-none transition focus:border-brand-500 focus:bg-white focus:ring-2 focus:ring-brand-100"
          />
          <button
            id="generate-btn"
            class="inline-flex items-center justify-center rounded-xl bg-brand-600 px-6 py-3 text-sm font-semibold text-white shadow-md shadow-brand-600/25 transition hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-60"
          >
            Generate Quiz
          </button>
        </div>
        <p id="error" class="mt-3 hidden text-sm text-red-600"></p>
      </section>

      <section
        id="quiz-container"
        class="hidden min-h-[200px] flex-1 rounded-2xl border border-slate-200/80 bg-white p-5 shadow-sm sm:p-6"
      >
        <div class="mb-4 flex items-center justify-between">
          <h2 class="text-lg font-semibold text-slate-900">Your Quiz</h2>
          <span id="status" class="text-xs font-medium text-brand-600"></span>
        </div>
        <pre
          id="quiz-output"
          class="whitespace-pre-wrap font-sans text-sm leading-relaxed text-slate-700 sm:text-base"
        ></pre>
      </section>

      <section
        id="placeholder"
        class="flex flex-1 items-center justify-center rounded-2xl border border-dashed border-slate-300 bg-white/60 p-8 text-center"
      >
        <p class="text-sm text-slate-400">
          Your quiz will appear here once you generate one.
        </p>
      </section>
    </main>

    <footer class="mt-8 text-center text-xs text-slate-400">
      Powered by OpenAI gpt-4o-mini
    </footer>
  </div>

  <script>
    const topicInput = document.getElementById("topic");
    const generateBtn = document.getElementById("generate-btn");
    const quizContainer = document.getElementById("quiz-container");
    const quizOutput = document.getElementById("quiz-output");
    const placeholder = document.getElementById("placeholder");
    const errorEl = document.getElementById("error");
    const statusEl = document.getElementById("status");

    function showError(message) {
      errorEl.textContent = message;
      errorEl.classList.remove("hidden");
    }

    function clearError() {
      errorEl.textContent = "";
      errorEl.classList.add("hidden");
    }

    async function generateQuiz() {
      const topic = topicInput.value.trim();
      if (!topic) {
        showError("Please enter a topic.");
        return;
      }

      clearError();
      generateBtn.disabled = true;
      generateBtn.textContent = "Generating...";
      quizOutput.textContent = "";
      quizContainer.classList.remove("hidden");
      placeholder.classList.add("hidden");
      statusEl.textContent = "Streaming...";

      try {
        const response = await fetch("/api/quiz", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ topic }),
        });

        if (!response.ok) {
          const data = await response.json().catch(() => ({}));
          throw new Error(data.detail || "Failed to generate quiz.");
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          quizOutput.textContent += decoder.decode(value, { stream: true });
          quizContainer.scrollIntoView({ behavior: "smooth", block: "nearest" });
        }

        statusEl.textContent = "Complete";
      } catch (err) {
        showError(err.message);
        statusEl.textContent = "";
        if (!quizOutput.textContent) {
          quizContainer.classList.add("hidden");
          placeholder.classList.remove("hidden");
        }
      } finally {
        generateBtn.disabled = false;
        generateBtn.textContent = "Generate Quiz";
      }
    }

    generateBtn.addEventListener("click", generateQuiz);
    topicInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") generateQuiz();
    });
  </script>
</body>
</html>
